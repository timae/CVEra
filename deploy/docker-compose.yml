## CVEra — local development stack
## Usage:
##   docker compose -f deploy/docker-compose.yml up -d
##   docker compose -f deploy/docker-compose.yml logs -f cverad
##   docker compose -f deploy/docker-compose.yml down -v   # destroy volumes

version: "3.9"

services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: cvera-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     cvera
      POSTGRES_PASSWORD: cvera_dev
      POSTGRES_DB:       cvera
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cvera"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── CVEra daemon ───────────────────────────────────────────────────────────
  cverad:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: cvera-daemon
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"   # HTTP API + /healthz + /readyz + /metrics
    environment:
      CVERA_DATABASE_HOST:     postgres
      CVERA_DATABASE_PORT:     "5432"
      CVERA_DATABASE_USER:     cvera
      CVERA_DATABASE_PASSWORD: cvera_dev
      CVERA_DATABASE_NAME:     cvera
      CVERA_DATABASE_SSLMODE:  disable

      CVERA_SERVER_HOST: "0.0.0.0"
      CVERA_SERVER_PORT: "8080"

      CVERA_LOGGING_LEVEL: debug

      # Set your NVD API key here or via a .env file
      CVERA_INGESTION_NVD_API_KEY: ""

      # Set your Slack webhook URL here or via a .env file
      CVERA_ALERTING_SLACK_WEBHOOK_URL: ""
      CVERA_ALERTING_SLACK_CHANNEL:     "#security-alerts-dev"

    volumes:
      # Mount local configs for quick iteration without rebuilding the image.
      - ../configs:/configs:ro
    command: ["serve", "--config", "/configs/config.yaml"]
    healthcheck:
      test: ["CMD", "/usr/local/bin/cvera", "--help"]   # binary health only
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
    driver: local
