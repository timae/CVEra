## CVEra — local development stack
##
## SQLite mode (default — no Postgres needed):
##   docker compose -f deploy/docker-compose.yml up -d cverad-sqlite
##   docker compose -f deploy/docker-compose.yml logs -f cverad-sqlite
##
## PostgreSQL mode:
##   docker compose -f deploy/docker-compose.yml --profile postgres up -d
##   docker compose -f deploy/docker-compose.yml logs -f cverad-postgres
##
## Tear everything down:
##   docker compose -f deploy/docker-compose.yml --profile postgres down -v

version: "3.9"

services:

  # ── CVEra with SQLite (zero-infra, default) ───────────────────────────────
  cverad-sqlite:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: cvera-sqlite
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      CVERA_DATABASE_BACKEND:  sqlite
      CVERA_DATABASE_SQLITE_PATH: /data/cvera.db

      CVERA_SERVER_HOST: "0.0.0.0"
      CVERA_SERVER_PORT: "8080"
      CVERA_LOGGING_LEVEL: debug

      CVERA_INGESTION_NVD_API_KEY:        ""   # set your key here or in .env
      CVERA_ALERTING_SLACK_WEBHOOK_URL:   ""   # set your webhook here or in .env
      CVERA_ALERTING_SLACK_CHANNEL:       "#security-alerts-dev"

    volumes:
      - sqlite_data:/data            # persists cvera.db across restarts
      - ../configs:/configs:ro       # live-reload configs without rebuilding
    command: ["serve", "--config", "/configs/config.yaml"]

  # ── PostgreSQL (only started with --profile postgres) ─────────────────────
  postgres:
    profiles: [postgres]
    image: postgres:16-alpine
    container_name: cvera-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     cvera
      POSTGRES_PASSWORD: cvera_dev
      POSTGRES_DB:       cvera
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cvera"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── CVEra with PostgreSQL (only started with --profile postgres) ───────────
  cverad-postgres:
    profiles: [postgres]
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: cvera-postgres-daemon
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8081:8080"   # offset to avoid conflict with cverad-sqlite
    environment:
      CVERA_DATABASE_BACKEND:      postgres
      CVERA_DATABASE_HOST:         postgres
      CVERA_DATABASE_PORT:         "5432"
      CVERA_DATABASE_USER:         cvera
      CVERA_DATABASE_PASSWORD:     cvera_dev
      CVERA_DATABASE_NAME:         cvera
      CVERA_DATABASE_SSLMODE:      disable

      CVERA_SERVER_HOST: "0.0.0.0"
      CVERA_SERVER_PORT: "8080"
      CVERA_LOGGING_LEVEL: debug

      CVERA_INGESTION_NVD_API_KEY:        ""
      CVERA_ALERTING_SLACK_WEBHOOK_URL:   ""
      CVERA_ALERTING_SLACK_CHANNEL:       "#security-alerts-dev"

    volumes:
      - ../configs:/configs:ro
    command: ["serve", "--config", "/configs/config.yaml"]

volumes:
  sqlite_data:
    driver: local
  postgres_data:
    driver: local
