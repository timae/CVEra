## CVEra — example configuration
##
## Copy to configs/config.yaml and fill in secrets.
## Every value here can also be set via environment variable with the
## CVERA_ prefix, e.g.  CVERA_DATABASE_PASSWORD=secret
##
## Environment variables take precedence over this file.

# ── Database ──────────────────────────────────────────────────────────────────
#
# CVEra supports two backends. Choose one:
#
#   sqlite   — Zero infrastructure. Data stored in a single file on disk.
#              Perfect for single-server deployments and local development.
#              No Postgres needed. This is the default.
#
#   postgres — Full PostgreSQL. Required if you run multiple instances of CVEra
#              (e.g. in Kubernetes). Supports pg_try_advisory_lock for safe
#              distributed job scheduling.
#
database:
  # ── SQLite (default) ─────────────────────────────────────────────────────
  backend:     sqlite
  sqlite_path: cvera.db      # path to the .db file; created automatically

  # ── PostgreSQL (uncomment to use) ────────────────────────────────────────
  # backend:   postgres
  # host:      localhost
  # port:      5432
  # user:      cvera
  # password:  cvera_dev      # override via CVERA_DATABASE_PASSWORD
  # name:      cvera
  # ssl_mode:  disable         # "require" in production
  # max_open_conns: 20
  # max_idle_conns: 5

# ── HTTP server ───────────────────────────────────────────────────────────────
server:
  host:          "0.0.0.0"
  port:          8080
  read_timeout:  15s
  write_timeout: 30s

# ── Prometheus metrics ────────────────────────────────────────────────────────
metrics:
  enabled: true
  path:    /metrics

# ── Logging ───────────────────────────────────────────────────────────────────
logging:
  level:  info      # debug | info | warn | error
  format: json      # json | console

# ── Alerting ──────────────────────────────────────────────────────────────────
alerting:
  slack:
    webhook_url: ""         # override via CVERA_ALERTING_SLACK_WEBHOOK_URL
    channel:    "#security-alerts"
    username:   "CVEra"
    icon_emoji: ":shield:"

  # Minimum severity to trigger a Slack alert.
  # Alerts below this threshold are still stored in the DB.
  min_severity: high        # critical | high | medium | low

  # Only alert on matches with at least this confidence level.
  min_confidence: strong    # exact | strong | weak | unknown

# ── Ingestion ─────────────────────────────────────────────────────────────────
ingestion:
  nvd:
    api_key:  ""            # override via CVERA_INGESTION_NVD_API_KEY
                            # Without a key requests are rate-limited to 5 req/30s.
    base_url: "https://services.nvd.nist.gov/rest/json/cves/2.0"
    schedule: "0 * * * *"  # hourly
    page_size: 2000
    lookback:  "2h"         # initial window for incremental sync

  cisa_kev:
    url:      "https://www.cisa.gov/sites/default/files/feeds/known_exploited_vulnerabilities.json"
    schedule: "0 6 * * *"  # daily at 06:00

  epss:
    url:      "https://epss.cyentia.com/epss_scores-current.csv.gz"
    schedule: "30 6 * * *" # daily at 06:30

# ── Matching ──────────────────────────────────────────────────────────────────
matching:
  # Maximum number of vulnerabilities processed in a single matching run.
  batch_size: 500
  # Parallelism for matching goroutines.
  workers: 4
